<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Login | Emmanuel Gospel Centre</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-zinc-100 min-h-screen flex items-center justify-center font-sans">

  <div class="max-w-md w-full mx-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-10">
      
      <!-- Logo -->
      <div class="flex justify-center mb-8">
        <div class="w-16 h-16 bg-amber-500 rounded-2xl flex items-center justify-center text-white text-4xl shadow-inner">✝</div>
      </div>

      <h1 class="text-3xl font-bold text-center text-[#0A3D62] mb-2">Member Login</h1>
      <p class="text-center text-gray-600 mb-8">Sign in to access members-only content</p>

      <!-- Google Login -->
      <button onclick="signInWithGoogle()" 
              class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:border-gray-400 py-4 rounded-2xl font-medium transition-all active:scale-[0.98] mb-6">
        <i class="fab fa-google text-red-500 text-xl"></i>
        Continue with Google
      </button>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center">
          <span class="bg-white px-4 text-xs uppercase tracking-widest text-gray-400">or sign in with email</span>
        </div>
      </div>

      <!-- Email Login Form -->
      <form id="email-form" class="space-y-4">
        <div>
          <input type="email" id="email" placeholder="Email address" 
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-amber-500 text-base">
        </div>
        <div>
          <input type="password" id="password" placeholder="Password" 
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-amber-500 text-base">
        </div>
        <button type="submit" 
                class="w-full bg-amber-500 hover:bg-amber-600 text-white py-4 rounded-2xl font-semibold transition-all">
          Sign In with Email
        </button>
      </form>

      <div class="mt-6 text-center text-sm">
        <a href="#" onclick="showRegister()" class="text-amber-600 hover:underline">Don't have an account? Register here</a>
      </div>
    </div>

    <p class="text-center text-gray-500 text-xs mt-10">© Emmanuel Gospel Centre</p>
  </div>

  <!-- Firebase Config + Auth Logic -->
  <script src="firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
